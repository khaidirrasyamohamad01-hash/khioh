<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff5f9e,#ff89c5,#ffd6e8);
}

.card{
    width:90%;
    max-width:450px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:35px;
    text-align:center;
    color:#fff;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    z-index:10;
}

.card h1{
    font-size:40px;
    margin-bottom:15px;
}

.card p{
    font-size:17px;
    line-height:1.8;
    margin-top:15px;
}

button{
    margin-top:25px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:#fff;
    color:#ff3d7a;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

#loveText{
    margin-top:20px;
    font-size:25px;
    color:#fff;
    font-weight:bold;
    display:none;
}

.heart{
    position:absolute;
    color:white;
    animation:fly linear forwards;
    pointer-events:none;
}

@keyframes fly{
    from{
        transform:translateY(0) scale(.5);
        opacity:1;
    }
    to{
        transform:translateY(-120vh) scale(2);
        opacity:0;
    }
}
</style>

</head>
<body>

<div class="card">

<h1>❤️ HAI DINDIN ❤️</h1>

<p>
Untuk perempuan cantik imut lucu.
<br><br>
Ana tau kamu badmood karna drng tmn tmn jaga gara kamu pe argen kalah cmn jangan ambe di hati yaa karna ini cmn permainan bola saja jadi jangan sakiti kamu pe hati mungil itu yaa cmn karna bola ini
</p>

<button onclick="love()">Klik Aku ❤️</button>

<div id="loveText">
I LOVE YOU SO MUCH ❤️🥰
</div>

</div>

<script>

function love(){

document.getElementById("loveText").style.display="block";

for(let i=0;i<80;i++){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.top="100vh";
heart.style.fontSize=(20+Math.random()*40)+"px";
heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

}

</script>

</body>
</html>
